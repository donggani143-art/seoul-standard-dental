    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "홈페이지 제작 기간은 얼마나 걸리나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "일반적인 기업 홈페이지는 기획, 디자인, 개발, 검수 과정을 포함해 보통 3~6주 정도 소요됩니다. 페이지 수와 기능, 콘텐츠 준비 상태에 따라 달라질 수 있습니다."
            }
          },
          {
            "@type": "Question",
            "name": "SEO를 반영하면 바로 검색 상위노출이 되나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "SEO는 검색엔진이 홈페이지를 이해하기 좋은 구조를 만드는 작업입니다. 상위노출은 업종 경쟁도, 콘텐츠 품질, 운영 기간, 외부 신뢰도에 따라 달라질 수 있습니다."
            }
          },
          {
            "@type": "Question",
            "name": "GEO는 기존 SEO와 무엇이 다른가요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "SEO가 검색엔진 노출을 위한 최적화라면, GEO는 생성형 AI가 브랜드와 서비스를 이해하고 답변에 활용할 수 있도록 정보를 구조화하는 전략입니다."
            }
          },
          {
            "@type": "Question",
            "name": "AEO는 왜 필요한가요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "사용자의 검색 방식이 키워드 중심에서 질문 중심으로 바뀌고 있기 때문입니다. AEO는 질문에 직접 답하는 콘텐츠를 구성해 검색과 AI 답변 환경에 대응합니다."
            }
          },
          {
            "@type": "Question",
            "name": "기존 홈페이지도 개선할 수 있나요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "가능합니다. 기존 홈페이지의 구조, 콘텐츠, 속도, 메타 정보, FAQ, 문의 동선을 진단한 뒤 개선할 수 있습니다."
            }
          },
          {
            "@type": "Question",
            "name": "제작 후 유지보수도 가능한가요?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "가능합니다. 텍스트 수정, 이미지 교체, 페이지 추가, 보안 점검, 콘텐츠 업데이트 등 운영에 필요한 유지보수를 지원합니다."
            }
          }
        ]
      }
    </script>
