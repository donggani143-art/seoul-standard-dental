<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="AEO 답변형 검색 최적화 일러스트">
  <defs>
    <linearGradient id="aeoBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A1B6B"/>
      <stop offset="55%" stop-color="#1428A0"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="aeoGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00B5E2" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#00B5E2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#aeoBg)"/>
  <circle cx="220" cy="200" r="220" fill="url(#aeoGlow)"/>

  <!-- Grid lines -->
  <g opacity=".18" stroke="#fff" stroke-width="1">
    <path d="M0 80 L400 80 M0 160 L400 160 M0 240 L400 240 M0 320 L400 320"/>
    <path d="M80 0 L80 400 M160 0 L160 400 M240 0 L240 400 M320 0 L320 400"/>
  </g>

  <!-- Sparkles -->
  <circle cx="354" cy="46" r="5" fill="#00B5E2"/>
  <circle cx="34" cy="220" r="3" fill="#fff" opacity=".7"/>
  <circle cx="368" cy="372" r="4" fill="#fff" opacity=".5"/>

  <!-- Question bubble (top, 캔버스 상단까지 채움) -->
  <g transform="translate(28, 28)">
    <rect width="232" height="84" rx="14" fill="#fff" opacity=".14"/>
    <rect x="14" y="20" width="28" height="28" rx="14" fill="#00B5E2"/>
    <text x="28" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="800">Q</text>
    <text x="52" y="36" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">홈페이지 제작 비용은?</text>
    <rect x="52" y="48" width="160" height="6" rx="3" fill="#fff" opacity=".4"/>
    <rect x="52" y="60" width="118" height="6" rx="3" fill="#fff" opacity=".25"/>
  </g>

  <!-- Answer card (오른쪽 가운데 영역) -->
  <g transform="translate(132, 138)">
    <rect width="248" height="108" rx="14" fill="#fff"/>
    <rect x="14" y="14" width="28" height="28" rx="14" fill="#1428A0"/>
    <text x="28" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="800">A</text>
    <text x="52" y="32" font-family="Arial, sans-serif" font-size="14" fill="#1428A0" font-weight="800">220만원부터</text>
    <rect x="52" y="42" width="178" height="5" rx="2" fill="#1428A0" opacity=".5"/>
    <rect x="52" y="52" width="138" height="5" rx="2" fill="#1428A0" opacity=".35"/>
    <rect x="14" y="72" width="106" height="24" rx="12" fill="#00B5E2"/>
    <text x="67" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="800">FAQ 인용</text>
    <rect x="126" y="72" width="78" height="24" rx="12" fill="#1428A0"/>
    <text x="165" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="800">근거</text>
  </g>

  <!-- FAQ list (하단) -->
  <g transform="translate(28, 270)">
    <rect width="344" height="104" rx="12" fill="#fff" opacity=".14"/>
    <text x="22" y="28" font-family="Arial, sans-serif" font-size="12.5" fill="#fff" font-weight="700" opacity=".95">Q. 제작 기간은?</text>
    <text x="22" y="56" font-family="Arial, sans-serif" font-size="12.5" fill="#fff" font-weight="700" opacity=".95">Q. 무엇이 포함되나요?</text>
    <text x="22" y="84" font-family="Arial, sans-serif" font-size="12.5" fill="#fff" font-weight="700" opacity=".95">Q. 어떻게 신청하나요?</text>
    <text x="322" y="28" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#00B5E2" font-weight="800">+</text>
    <text x="322" y="56" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#00B5E2" font-weight="800">+</text>
    <text x="322" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#00B5E2" font-weight="800">+</text>
  </g>

  <!-- Connecting dotted line: Q → A (시각적 연결) -->
  <g stroke="#00B5E2" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity=".55">
    <path d="M260 70 C 290 70, 320 110, 256 138"/>
  </g>
</svg>
