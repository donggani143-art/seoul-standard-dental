<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-label="제작비 50% 할인과 호스팅 1년 무료 이벤트">
  <defs>
    <linearGradient id="evBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5774FF"/>
      <stop offset="55%"  stop-color="#3F5BF5"/>
      <stop offset="100%" stop-color="#2A45E0"/>
    </linearGradient>
    <linearGradient id="evBlueHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity=".35"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="evPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B9A0FF"/>
      <stop offset="55%"  stop-color="#9978F1"/>
      <stop offset="100%" stop-color="#7A56DC"/>
    </linearGradient>
    <linearGradient id="evPurpleHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity=".35"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="evCircle" cx="50%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="#E8F0FF"/>
      <stop offset="80%"  stop-color="#CFDFFB"/>
      <stop offset="100%" stop-color="#BCD2F8"/>
    </radialGradient>
    <linearGradient id="giftBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDE8FF"/>
    </linearGradient>
    <linearGradient id="giftBoxSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8EFFF"/>
      <stop offset="100%" stop-color="#C2D1F2"/>
    </linearGradient>
    <linearGradient id="giftBow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="evShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1428A0" flood-opacity=".3"/>
    </filter>
    <filter id="evShadowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#5B3DD9" flood-opacity=".35"/>
    </filter>
    <filter id="evShadowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5B3DD9" flood-opacity=".25"/>
    </filter>
  </defs>

  <!-- 배경 원 -->
  <circle cx="380" cy="270" r="240" fill="url(#evCircle)"/>

  <!-- 컨페티 -->
  <g>
    <rect x="120" y="60"   width="22" height="8" rx="4" fill="#FFC36A" transform="rotate(-25 131 64)"/>
    <rect x="610" y="50"   width="24" height="8" rx="4" fill="#A78BFA" transform="rotate(20 622 54)"/>
    <rect x="56"  y="280"  width="22" height="8" rx="4" fill="#FFB4D2" transform="rotate(45 67 284)"/>
    <rect x="666" y="260"  width="22" height="8" rx="4" fill="#FFC36A" transform="rotate(-15 677 264)"/>
    <rect x="160" y="470"  width="24" height="8" rx="4" fill="#7CC3FF" transform="rotate(35 172 474)"/>
    <rect x="500" y="80"   width="20" height="8" rx="4" fill="#7CC3FF" transform="rotate(-40 510 84)"/>
    <rect x="540" y="470"  width="22" height="8" rx="4" fill="#A78BFA" transform="rotate(28 551 474)"/>
    <rect x="80"  y="170"  width="20" height="8" rx="4" fill="#3F5BF5" transform="rotate(50 90 174)"/>
    <rect x="420" y="20"   width="18" height="8" rx="4" fill="#FFB4D2" transform="rotate(15 429 24)"/>
    <circle cx="60"   cy="100" r="5" fill="#FFC36A"/>
    <circle cx="710"  cy="430" r="5" fill="#7CC3FF"/>
    <circle cx="220"  cy="510" r="4" fill="#A78BFA"/>
    <circle cx="40"   cy="380" r="3" fill="#3F5BF5"/>
    <circle cx="700"  cy="120" r="4" fill="#A78BFA"/>
  </g>

  <!-- Blue ticket -->
  <g transform="translate(80 70) rotate(-7 230 110)" filter="url(#evShadow)">
    <path d="M 18 0 H 90 a 12 12 0 0 1 24 0 H 442 a 18 18 0 0 1 18 18 V 202 a 18 18 0 0 1 -18 18 H 114 a 12 12 0 0 1 -24 0 H 18 a 18 18 0 0 1 -18 -18 V 18 a 18 18 0 0 1 18 -18 Z" fill="url(#evBlue)"/>
    <path d="M 18 0 H 90 a 12 12 0 0 1 24 0 H 442 a 18 18 0 0 1 18 18 V 60 H 0 V 18 a 18 18 0 0 1 18 -18 Z" fill="url(#evBlueHi)"/>
    <line x1="102" y1="14" x2="102" y2="206" stroke="#FFFFFF" stroke-width="2.2" stroke-dasharray="4 7" opacity=".75"/>
    <g transform="translate(58 110) rotate(-90)">
      <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fff" font-weight="800" letter-spacing="8" opacity=".9">EVENT</text>
    </g>
    <text x="290" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#fff" font-weight="700" letter-spacing="4" opacity=".95">제 작 비</text>
    <text x="290" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="86" fill="#fff" font-weight="900" letter-spacing="-3">50<tspan font-size="46" dy="-2">%</tspan></text>
  </g>

  <!-- Purple ticket -->
  <g transform="translate(140 280) rotate(8 230 100)" filter="url(#evShadowPurple)">
    <path d="M 18 0 H 90 a 12 12 0 0 1 24 0 H 442 a 18 18 0 0 1 18 18 V 182 a 18 18 0 0 1 -18 18 H 114 a 12 12 0 0 1 -24 0 H 18 a 18 18 0 0 1 -18 -18 V 18 a 18 18 0 0 1 18 -18 Z" fill="url(#evPurple)"/>
    <path d="M 18 0 H 90 a 12 12 0 0 1 24 0 H 442 a 18 18 0 0 1 18 18 V 56 H 0 V 18 a 18 18 0 0 1 18 -18 Z" fill="url(#evPurpleHi)"/>
    <line x1="102" y1="14" x2="102" y2="186" stroke="#FFFFFF" stroke-width="2.2" stroke-dasharray="4 7" opacity=".75"/>
    <g transform="translate(58 100) rotate(-90)">
      <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fff" font-weight="800" letter-spacing="8" opacity=".9">EVENT</text>
    </g>
    <text x="290" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff" font-weight="700" letter-spacing="4" opacity=".95">호 스 팅</text>
    <text x="290" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" fill="#fff" font-weight="900" letter-spacing="-2">1년 무료</text>
  </g>

  <!-- 선물 상자 -->
  <g transform="translate(610 380)" filter="url(#evShadowSoft)">
    <rect x="2" y="46" width="116" height="8" rx="2" fill="url(#giftBoxSide)"/>
    <rect x="0" y="32" width="120" height="22" rx="4" fill="url(#giftBox)" stroke="#C8D2E8" stroke-width="1"/>
    <rect x="6" y="54" width="108" height="62" rx="3" fill="#fff" stroke="#C8D2E8" stroke-width="1"/>
    <rect x="6" y="54" width="14" height="62" fill="#E8EFFF" opacity=".7"/>
    <rect x="52" y="32" width="14" height="84" fill="url(#giftBow)"/>
    <ellipse cx="42" cy="26" rx="14" ry="12" fill="url(#giftBow)"/>
    <ellipse cx="76" cy="26" rx="14" ry="12" fill="url(#giftBow)"/>
    <ellipse cx="42" cy="26" rx="6" ry="5" fill="#5B3DD9" opacity=".45"/>
    <ellipse cx="76" cy="26" rx="6" ry="5" fill="#5B3DD9" opacity=".45"/>
    <rect x="55" y="20" width="8" height="14" rx="2" fill="url(#giftBow)"/>
    <path d="M 56 38 L 44 56 L 52 54 L 50 64 L 58 58 Z" fill="url(#giftBow)" opacity=".82"/>
    <path d="M 62 38 L 76 58 L 68 56 L 70 66 L 62 60 Z" fill="url(#giftBow)" opacity=".82"/>
  </g>
</svg>
